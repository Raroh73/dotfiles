name: CI
on:
  schedule:
    - cron: "0 0 * * 0"
jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install Nix
        uses: cachix/install-nix-action@v17
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@v14
        with:
          commit-msg: "chore: update inputs"
          pr-title: "chore: update inputs"
          pr-labels: "status: new", "priority: low", "type: chore", "scope: dependency", "scope: flake"
